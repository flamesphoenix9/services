version: "3.9"

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - web

  cart:
    build: ./cart
    container_name: cart
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web
    env_file:
      - ./cart/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cart.rule=PathPrefix(`/cart`)"
      - "traefik.http.routers.cart.entrypoints=web"
        # JWT validation
      - "traefik.http.middlewares.cart-stripprefix.stripprefix.prefixes=/cart"
      - "traefik.http.routers.cart.middlewares=cart-stripprefix,jwt-auth"
      - "traefik.http.services.cart.loadbalancer.server.port=8002"

  auth:
    build: ./auth
    container_name: auth
    restart: always
    depends_on:
      user:
        condition: service_healthy
    networks:
      - web
    env_file:
      - ./auth/.env
    labels:
      - "traefik.enable=true"
      # JWT validation
      - "traefik.http.middlewares.jwt-auth.forwardauth.address=http://auth:8008/validate"
      - "traefik.http.middlewares.jwt-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.jwt-auth.forwardauth.authResponseHeaders=x-user-id,x-user-role,x-verified,x-email"

  user:
    build: ./user
    container_name: user
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - ./user/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user.rule=PathPrefix(`/user`)"
      - "traefik.http.routers.user.entrypoints=web"
      - "traefik.http.middlewares.user-stripprefix.stripprefix.prefixes=/user"
      - "traefik.http.routers.user.middlewares=user-stripprefix" # No Auth for Login/Reg

  product:
    build: ./product
    container_name: product
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
    env_file:
      - ./product/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.product.rule=PathPrefix(`/product`)"
      - "traefik.http.routers.product.entrypoints=web"
        # JWT validation
      - "traefik.http.middlewares.product-stripprefix.stripprefix.prefixes=/product"
      - "traefik.http.routers.product.middlewares=product-stripprefix,jwt-auth"

  order:
    build: ./order
    container_name: order
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - web
    env_file:
      - ./order/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.order.rule=PathPrefix(`/order`)"
      - "traefik.http.routers.order.entrypoints=web"
        # JWT validation
      - "traefik.http.middlewares.order-stripprefix.stripprefix.prefixes=/order"
      - "traefik.http.routers.order.middlewares=order-stripprefix,jwt-auth"
      - "traefik.http.services.order.loadbalancer.server.port=8003"

  payment:
    build: ./payment
    container_name: payment
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - web
    env_file:
      - ./payment/.env
    labels:
      - "traefik.enable=true"
      # ROUTER 1: Protected (Initiate Payment)
      - "traefik.http.routers.payment.rule=PathPrefix(`/payment`) && !PathPrefix(`/payment/webhook`)"
      - "traefik.http.routers.payment.middlewares=payment-stripprefix,jwt-auth"

      # ROUTER 2: Public (Paystack Webhook)
      - "traefik.http.routers.payment-public.rule=PathPrefix(`/payment/webhook`)"
      - "traefik.http.routers.payment-public.middlewares=payment-stripprefix"

      - "traefik.http.middlewares.payment-stripprefix.stripprefix.prefixes=/payment"
      - "traefik.http.services.payment.loadbalancer.server.port=8006"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    healthcheck:
      # This command checks if the RabbitMQ node is fully functional
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - web
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web
    ports:
      - "6379:6379"

  postgres:
    image: postgres:alpine
    container_name: postgres
    restart: always
    healthcheck:
      # pg_isready checks if the server is up
      # -U specifies the user, -d specifies the database to check
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d main_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      # pull from root .env
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - ./postgres_data_folder:/var/lib/postgresql
    networks:
      - web
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: always
    networks:
      - web
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "traefik:80"  # Points to traefik service 
    depends_on:
      - traefik
    ports:
      - "4040:4040"  


networks:
  web:
    external: false
